AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
    serverless-state-machine

    Serverless agreement workflow with JWT auth, outbox delivery, and async settlement processing

Parameters:
    DatabaseUrl:
        Type: String
        Default: ''
    EventPublisherMode:
        Type: String
        Default: local
    EventBusName:
        Type: String
        Default: default
    SupabaseIssuer:
        Type: String
        Default: https://your-project-ref.supabase.co/auth/v1
    SupabaseAudience:
        Type: String
        Default: authenticated
    FrontendOrigin:
        Type: String
        Default: http://localhost:5173
    LogRetentionInDays:
        Type: Number
        Default: 30
    OpsAlertsEmailEndpoint:
        Type: String
        Default: ops@example.com

# More info about Globals: https://github.com/awslabs/serverless-application-model/blob/master/docs/globals.rst
Globals:
    Function:
        Timeout: 10
        # ReservedConcurrentExecutions is intentionally omitted for demo deploys.
        # It reserves capacity from the account-wide Lambda concurrency pool; this
        # account's limit is 10 in eu-central-1, so per-function reservations
        # (summing to ~31) would fail deploy. Re-enable per function in production
        # once the account quota is raised and load patterns are known.

Resources:
    SharedLayer:
        Type: AWS::Serverless::LayerVersion
        Properties:
            LayerName: payments-example-lambda-utils
            Description: Shared auth, HTTP utilities, and error helpers for API Lambdas
            ContentUri: layers/lambda-utils/
            CompatibleRuntimes:
                - nodejs24.x
    OpsAlertsTopic:
        Type: AWS::SNS::Topic
        Properties:
            TopicName: OpsAlertsTopic
    OpsAlertsEmailSubscription:
        Type: AWS::SNS::Subscription
        Properties:
            TopicArn: !Ref OpsAlertsTopic
            Protocol: email
            Endpoint: !Ref OpsAlertsEmailEndpoint
    # NOTE: Using explicit DefinitionBody instead of SAM shorthand (Auth + CorsConfiguration +
    # event-driven route generation) to work around a known SAM bug where
    # AWS::Serverless::HttpApi with Auth.DefaultAuthorizer silently fails to
    # synthesize routes, authorizers, and deployments.
    # See: https://github.com/awslabs/serverless-application-model/issues/1556
    #      https://github.com/aws/serverless-application-model/issues/2688
    #      https://github.com/aws/serverless-application-model/issues/2689
    PaymentsHttpApi:
        Type: AWS::Serverless::HttpApi
        Properties:
            StageName: Prod
            FailOnWarnings: true
            RouteSettings:
                $default:
                    ThrottlingBurstLimit: 10
                    ThrottlingRateLimit: 5
            DefinitionBody:
                openapi: '3.0.1'
                info:
                    title: !Sub '${AWS::StackName}-api'
                    version: '1.0'
                security:
                    - SupabaseJwtAuthorizer: []
                paths:
                    /agreements:
                        post:
                            parameters:
                                - name: Idempotency-Key
                                  in: header
                                  schema:
                                      type: string
                                      pattern: '^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$'
                                  required: true
                                  description: Idempotency key for safe retries
                            x-amazon-apigateway-integration:
                                type: aws_proxy
                                httpMethod: POST
                                payloadFormatVersion: '2.0'
                                uri: !Sub arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${CreateAgreementFunction.Arn}/invocations
                        get:
                            x-amazon-apigateway-integration:
                                type: aws_proxy
                                httpMethod: POST
                                payloadFormatVersion: '2.0'
                                uri: !Sub arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${ListAgreementsFunction.Arn}/invocations
                    /agreements/{agreementId}/approve:
                        post:
                            x-amazon-apigateway-integration:
                                type: aws_proxy
                                httpMethod: POST
                                payloadFormatVersion: '2.0'
                                uri: !Sub arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${ApproveAgreementFunction.Arn}/invocations
                    /agreements/{agreementId}/fund:
                        post:
                            x-amazon-apigateway-integration:
                                type: aws_proxy
                                httpMethod: POST
                                payloadFormatVersion: '2.0'
                                uri: !Sub arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${FundAgreementFunction.Arn}/invocations
                    /agreements/{agreementId}/settle:
                        post:
                            x-amazon-apigateway-integration:
                                type: aws_proxy
                                httpMethod: POST
                                payloadFormatVersion: '2.0'
                                uri: !Sub arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${SettleAgreementFunction.Arn}/invocations
                    /debug/events:
                        get:
                            x-amazon-apigateway-integration:
                                type: aws_proxy
                                httpMethod: POST
                                payloadFormatVersion: '2.0'
                                uri: !Sub arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${DebugEventsFunction.Arn}/invocations
                    /ledger:
                        get:
                            x-amazon-apigateway-integration:
                                type: aws_proxy
                                httpMethod: POST
                                payloadFormatVersion: '2.0'
                                uri: !Sub arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${ListLedgerFunction.Arn}/invocations
                x-amazon-apigateway-cors:
                    allowOrigins:
                        - !Ref FrontendOrigin
                    allowHeaders:
                        - authorization
                        - content-type
                        - idempotency-key
                        - x-debug-simulate-post-commit-crash
                    allowMethods:
                        - GET
                        - POST
                        - OPTIONS
                    allowCredentials: false
                components:
                    securitySchemes:
                        SupabaseJwtAuthorizer:
                            type: oauth2
                            x-amazon-apigateway-authorizer:
                                type: jwt
                                identitySource: $request.header.Authorization
                                jwtConfiguration:
                                    issuer: !Ref SupabaseIssuer
                                    audience:
                                        - !Ref SupabaseAudience
    CreateAgreementFunction:
        Type: AWS::Serverless::Function
        Properties:
            CodeUri: functions/create-agreement/
            Handler: app.lambdaHandler
            Runtime: nodejs24.x
            Architectures:
                - x86_64
            # ReservedConcurrentExecutions: 3
            LoggingConfig:
                LogGroup: !Sub '/payments-example/${AWS::StackName}/create-agreement'
            Layers:
                - !Ref SharedLayer
            Environment:
                Variables:
                    DATABASE_URL: !Ref DatabaseUrl
                    ENABLE_MANUAL_SETTLEMENT_TRIGGER: 'false'
            Events:
                CreateAgreement:
                    Type: HttpApi
                    Properties:
                        ApiId: !Ref PaymentsHttpApi
                        Path: /agreements
                        Method: post
        Metadata:
            BuildMethod: esbuild
            BuildProperties:
                Minify: true
                Target: 'es2020'
                Sourcemap: true
                External:
                    - '@payments-example/lambda-utils'
                EntryPoints:
                    - app.ts
    DebugEventsFunction:
        Type: AWS::Serverless::Function
        Properties:
            CodeUri: functions/debug-events/
            Handler: app.lambdaHandler
            Runtime: nodejs24.x
            Architectures:
                - x86_64
            # ReservedConcurrentExecutions: 5
            LoggingConfig:
                LogGroup: !Sub '/payments-example/${AWS::StackName}/debug-events'
            Layers:
                - !Ref SharedLayer
            Environment:
                Variables:
                    DATABASE_URL: !Ref DatabaseUrl
            Events:
                DebugEvents:
                    Type: HttpApi
                    Properties:
                        ApiId: !Ref PaymentsHttpApi
                        Path: /debug/events
                        Method: get
        Metadata:
            BuildMethod: esbuild
            BuildProperties:
                Minify: true
                Target: 'es2020'
                Sourcemap: true
                External:
                    - '@payments-example/lambda-utils'
                EntryPoints:
                    - app.ts
    ListAgreementsFunction:
        Type: AWS::Serverless::Function
        Properties:
            CodeUri: functions/list-agreements/
            Handler: app.lambdaHandler
            Runtime: nodejs24.x
            Architectures:
                - x86_64
            # ReservedConcurrentExecutions: 5
            LoggingConfig:
                LogGroup: !Sub '/payments-example/${AWS::StackName}/list-agreements'
            Layers:
                - !Ref SharedLayer
            Environment:
                Variables:
                    DATABASE_URL: !Ref DatabaseUrl
            Events:
                ListAgreements:
                    Type: HttpApi
                    Properties:
                        ApiId: !Ref PaymentsHttpApi
                        Path: /agreements
                        Method: get
        Metadata:
            BuildMethod: esbuild
            BuildProperties:
                Minify: true
                Target: 'es2020'
                Sourcemap: true
                External:
                    - '@payments-example/lambda-utils'
                EntryPoints:
                    - app.ts
    ListLedgerFunction:
        Type: AWS::Serverless::Function
        Properties:
            CodeUri: functions/list-ledger/
            Handler: app.lambdaHandler
            Runtime: nodejs24.x
            Architectures:
                - x86_64
            # ReservedConcurrentExecutions: 5
            LoggingConfig:
                LogGroup: !Sub '/payments-example/${AWS::StackName}/list-ledger'
            Layers:
                - !Ref SharedLayer
            Environment:
                Variables:
                    DATABASE_URL: !Ref DatabaseUrl
            Events:
                ListLedger:
                    Type: HttpApi
                    Properties:
                        ApiId: !Ref PaymentsHttpApi
                        Path: /ledger
                        Method: get
        Metadata:
            BuildMethod: esbuild
            BuildProperties:
                Minify: true
                Target: 'es2020'
                Sourcemap: true
                External:
                    - '@payments-example/lambda-utils'
                EntryPoints:
                    - app.ts
    ApproveAgreementFunction:
        Type: AWS::Serverless::Function
        Properties:
            CodeUri: functions/transition-agreement/
            Handler: handlers/http/app.lambdaHandler
            Runtime: nodejs24.x
            Architectures:
                - x86_64
            # ReservedConcurrentExecutions: 3
            LoggingConfig:
                LogGroup: !Sub '/payments-example/${AWS::StackName}/approve-agreement'
            Layers:
                - !Ref SharedLayer
            Environment:
                Variables:
                    DATABASE_URL: !Ref DatabaseUrl
                    ENABLE_MANUAL_SETTLEMENT_TRIGGER: 'false'
                    TRANSITION_EVENT_TYPE: AgreementApproved
                    EXPECTED_CURRENT_STATUS: CREATED
                    NEXT_STATUS: APPROVED
            Events:
                ApproveAgreement:
                    Type: HttpApi
                    Properties:
                        ApiId: !Ref PaymentsHttpApi
                        Path: /agreements/{agreementId}/approve
                        Method: post
        Metadata:
            BuildMethod: esbuild
            BuildProperties:
                Minify: true
                Target: 'es2020'
                Sourcemap: true
                External:
                    - '@payments-example/lambda-utils'
                EntryPoints:
                    - handlers/http/app.ts
    FundAgreementFunction:
        Type: AWS::Serverless::Function
        Properties:
            CodeUri: functions/transition-agreement/
            Handler: handlers/http/app.lambdaHandler
            Runtime: nodejs24.x
            Architectures:
                - x86_64
            # ReservedConcurrentExecutions: 3
            LoggingConfig:
                LogGroup: !Sub '/payments-example/${AWS::StackName}/fund-agreement'
            Layers:
                - !Ref SharedLayer
            Environment:
                Variables:
                    DATABASE_URL: !Ref DatabaseUrl
                    ENABLE_MANUAL_SETTLEMENT_TRIGGER: 'false'
                    TRANSITION_EVENT_TYPE: AgreementFunded
                    EXPECTED_CURRENT_STATUS: APPROVED
                    NEXT_STATUS: FUNDED
            Events:
                FundAgreement:
                    Type: HttpApi
                    Properties:
                        ApiId: !Ref PaymentsHttpApi
                        Path: /agreements/{agreementId}/fund
                        Method: post
        Metadata:
            BuildMethod: esbuild
            BuildProperties:
                Minify: true
                Target: 'es2020'
                Sourcemap: true
                External:
                    - '@payments-example/lambda-utils'
                EntryPoints:
                    - handlers/http/app.ts
    SettleAgreementFunction:
        Type: AWS::Serverless::Function
        Properties:
            CodeUri: functions/transition-agreement/
            Handler: handlers/http/app.lambdaHandler
            Runtime: nodejs24.x
            Architectures:
                - x86_64
            # ReservedConcurrentExecutions: 3
            LoggingConfig:
                LogGroup: !Sub '/payments-example/${AWS::StackName}/settle-agreement'
            Layers:
                - !Ref SharedLayer
            Environment:
                Variables:
                    DATABASE_URL: !Ref DatabaseUrl
                    ENABLE_DEV_FAILURE_SIMULATION: 'false'
                    ENABLE_MANUAL_SETTLEMENT_TRIGGER: 'false'
                    TRANSITION_EVENT_TYPE: AgreementSettled
                    EXPECTED_CURRENT_STATUS: FUNDED
                    NEXT_STATUS: SETTLED
            Events:
                SettleAgreement:
                    Type: HttpApi
                    Properties:
                        ApiId: !Ref PaymentsHttpApi
                        Path: /agreements/{agreementId}/settle
                        Method: post
        Metadata:
            BuildMethod: esbuild
            BuildProperties:
                Minify: true
                Target: 'es2020'
                Sourcemap: true
                External:
                    - '@payments-example/lambda-utils'
                EntryPoints:
                    - handlers/http/app.ts
    SettlementQueue:
        Type: AWS::SQS::Queue
        Properties:
            QueueName: !Sub '${AWS::StackName}-settlement-queue'
            VisibilityTimeout: 30
            RedrivePolicy:
                deadLetterTargetArn: !GetAtt SettlementDeadLetterQueue.Arn
                maxReceiveCount: 3

    SettlementDeadLetterQueue:
        DeletionPolicy: Retain
        UpdateReplacePolicy: Retain
        Type: AWS::SQS::Queue
        Properties:
            QueueName: !Sub '${AWS::StackName}-settlement-dlq'

    FundedEventRule:
        Type: AWS::Events::Rule
        Properties:
            EventBusName: !Ref EventBusName
            EventPattern:
                source:
                    - payments-example.agreements
                detail-type:
                    - AgreementFunded
            State: ENABLED
            Targets:
                - Arn: !GetAtt SettlementQueue.Arn
                  Id: SettlementQueueTarget

    SettlementQueueSqsPolicy:
        Type: AWS::SQS::QueuePolicy
        Properties:
            Queues:
                - !Ref SettlementQueue
            PolicyDocument:
                Version: '2012-10-17'
                Statement:
                    - Effect: Allow
                      Principal:
                          Service: events.amazonaws.com
                      Action: sqs:SendMessage
                      Resource: !GetAtt SettlementQueue.Arn

    SettlementProcessorFunction:
        Type: AWS::Serverless::Function
        Properties:
            CodeUri: functions/transition-agreement/
            Handler: handlers/settlement/settlement-handler.lambdaHandler
            Runtime: nodejs24.x
            Architectures:
                - x86_64
            # ReservedConcurrentExecutions: 2
            LoggingConfig:
                LogGroup: !Sub '/payments-example/${AWS::StackName}/settlement-processor'
            Layers:
                - !Ref SharedLayer
            Environment:
                Variables:
                    DATABASE_URL: !Ref DatabaseUrl
                    ENABLE_DEV_FAILURE_SIMULATION: 'false'
            Events:
                SettlementQueueTrigger:
                    Type: SQS
                    Properties:
                        Queue: !GetAtt SettlementQueue.Arn
                        BatchSize: 10
                        FunctionResponseTypes:
                            - ReportBatchItemFailures
        Metadata:
            BuildMethod: esbuild
            BuildProperties:
                Minify: true
                Target: 'es2020'
                Sourcemap: true
                External:
                    - '@payments-example/lambda-utils'
                EntryPoints:
                    - handlers/settlement/settlement-handler.ts
    OutboxDispatcherFunction:
        Type: AWS::Serverless::Function
        Properties:
            CodeUri: functions/transition-agreement/
            Handler: handlers/outbox/outbox-dispatcher.lambdaHandler
            Runtime: nodejs24.x
            Architectures:
                - x86_64
            # ReservedConcurrentExecutions: 2
            LoggingConfig:
                LogGroup: !Sub '/payments-example/${AWS::StackName}/outbox-dispatcher'
            Layers:
                - !Ref SharedLayer
            Environment:
                Variables:
                    DATABASE_URL: !Ref DatabaseUrl
                    EVENT_PUBLISHER_MODE: !Ref EventPublisherMode
                    EVENT_BUS_NAME: !Ref EventBusName
                    OUTBOX_DISPATCH_BATCH_SIZE: '20'
            Policies:
                - Statement:
                      - Effect: Allow
                        Action:
                            - events:PutEvents
                        Resource: !Sub arn:${AWS::Partition}:events:${AWS::Region}:${AWS::AccountId}:event-bus/${EventBusName}
            Events:
                OutboxDispatchSchedule:
                    Type: Schedule
                    Properties:
                        Schedule: rate(1 minute)
        Metadata:
            BuildMethod: esbuild
            BuildProperties:
                Minify: true
                Target: 'es2020'
                Sourcemap: true
                External:
                    - '@payments-example/lambda-utils'
                EntryPoints:
                    - handlers/outbox/outbox-dispatcher.ts

    CreateAgreementFunctionLogGroup:
        Type: AWS::Logs::LogGroup
        Properties:
            LogGroupName: !Sub '/payments-example/${AWS::StackName}/create-agreement'
            RetentionInDays: !Ref LogRetentionInDays
    DebugEventsFunctionLogGroup:
        Type: AWS::Logs::LogGroup
        Properties:
            LogGroupName: !Sub '/payments-example/${AWS::StackName}/debug-events'
            RetentionInDays: !Ref LogRetentionInDays
    ListAgreementsFunctionLogGroup:
        Type: AWS::Logs::LogGroup
        Properties:
            LogGroupName: !Sub '/payments-example/${AWS::StackName}/list-agreements'
            RetentionInDays: !Ref LogRetentionInDays
    ListLedgerFunctionLogGroup:
        Type: AWS::Logs::LogGroup
        Properties:
            LogGroupName: !Sub '/payments-example/${AWS::StackName}/list-ledger'
            RetentionInDays: !Ref LogRetentionInDays
    ApproveAgreementFunctionLogGroup:
        Type: AWS::Logs::LogGroup
        Properties:
            LogGroupName: !Sub '/payments-example/${AWS::StackName}/approve-agreement'
            RetentionInDays: !Ref LogRetentionInDays
    FundAgreementFunctionLogGroup:
        Type: AWS::Logs::LogGroup
        Properties:
            LogGroupName: !Sub '/payments-example/${AWS::StackName}/fund-agreement'
            RetentionInDays: !Ref LogRetentionInDays
    SettleAgreementFunctionLogGroup:
        Type: AWS::Logs::LogGroup
        Properties:
            LogGroupName: !Sub '/payments-example/${AWS::StackName}/settle-agreement'
            RetentionInDays: !Ref LogRetentionInDays
    SettlementProcessorFunctionLogGroup:
        Type: AWS::Logs::LogGroup
        Properties:
            LogGroupName: !Sub '/payments-example/${AWS::StackName}/settlement-processor'
            RetentionInDays: !Ref LogRetentionInDays
    OutboxDispatcherFunctionLogGroup:
        Type: AWS::Logs::LogGroup
        Properties:
            LogGroupName: !Sub '/payments-example/${AWS::StackName}/outbox-dispatcher'
            RetentionInDays: !Ref LogRetentionInDays

    SettlementDeadLetterQueueAlarm:
        Type: AWS::CloudWatch::Alarm
        Properties:
            AlarmName: !Sub '${AWS::StackName}-SettlementDeadLetterQueue-VisibleMessages'
            AlarmDescription: Settlement DLQ has visible messages
            Namespace: AWS/SQS
            MetricName: ApproximateNumberOfMessagesVisible
            Dimensions:
                - Name: QueueName
                  Value: !GetAtt SettlementDeadLetterQueue.QueueName
            Statistic: Maximum
            Period: 300
            EvaluationPeriods: 1
            DatapointsToAlarm: 1
            Threshold: 1
            ComparisonOperator: GreaterThanOrEqualToThreshold
            TreatMissingData: notBreaching
            AlarmActions:
                - !Ref OpsAlertsTopic
    PaymentsHttpApi5xxAlarm:
        Type: AWS::CloudWatch::Alarm
        Properties:
            AlarmName: !Sub '${AWS::StackName}-PaymentsHttpApi-5XX'
            AlarmDescription: HTTP API is returning 5XX responses
            Namespace: AWS/ApiGateway
            MetricName: 5XXError
            Dimensions:
                - Name: ApiId
                  Value: !Ref PaymentsHttpApi
                - Name: Stage
                  Value: Prod
            Statistic: Sum
            Period: 300
            EvaluationPeriods: 1
            DatapointsToAlarm: 1
            Threshold: 1
            ComparisonOperator: GreaterThanOrEqualToThreshold
            TreatMissingData: notBreaching
            AlarmActions:
                - !Ref OpsAlertsTopic
    CreateAgreementFunctionErrorsAlarm:
        Type: AWS::CloudWatch::Alarm
        Properties:
            AlarmName: !Sub '${AWS::StackName}-CreateAgreementFunction-Errors'
            AlarmDescription: CreateAgreementFunction reported Lambda errors
            Namespace: AWS/Lambda
            MetricName: Errors
            Dimensions:
                - Name: FunctionName
                  Value: !Ref CreateAgreementFunction
            Statistic: Sum
            Period: 300
            EvaluationPeriods: 1
            DatapointsToAlarm: 1
            Threshold: 1
            ComparisonOperator: GreaterThanOrEqualToThreshold
            TreatMissingData: notBreaching
            AlarmActions:
                - !Ref OpsAlertsTopic
    DebugEventsFunctionErrorsAlarm:
        Type: AWS::CloudWatch::Alarm
        Properties:
            AlarmName: !Sub '${AWS::StackName}-DebugEventsFunction-Errors'
            AlarmDescription: DebugEventsFunction reported Lambda errors
            Namespace: AWS/Lambda
            MetricName: Errors
            Dimensions:
                - Name: FunctionName
                  Value: !Ref DebugEventsFunction
            Statistic: Sum
            Period: 300
            EvaluationPeriods: 1
            DatapointsToAlarm: 1
            Threshold: 1
            ComparisonOperator: GreaterThanOrEqualToThreshold
            TreatMissingData: notBreaching
            AlarmActions:
                - !Ref OpsAlertsTopic
    ListAgreementsFunctionErrorsAlarm:
        Type: AWS::CloudWatch::Alarm
        Properties:
            AlarmName: !Sub '${AWS::StackName}-ListAgreementsFunction-Errors'
            AlarmDescription: ListAgreementsFunction reported Lambda errors
            Namespace: AWS/Lambda
            MetricName: Errors
            Dimensions:
                - Name: FunctionName
                  Value: !Ref ListAgreementsFunction
            Statistic: Sum
            Period: 300
            EvaluationPeriods: 1
            DatapointsToAlarm: 1
            Threshold: 1
            ComparisonOperator: GreaterThanOrEqualToThreshold
            TreatMissingData: notBreaching
            AlarmActions:
                - !Ref OpsAlertsTopic
    ListLedgerFunctionErrorsAlarm:
        Type: AWS::CloudWatch::Alarm
        Properties:
            AlarmName: !Sub '${AWS::StackName}-ListLedgerFunction-Errors'
            AlarmDescription: ListLedgerFunction reported Lambda errors
            Namespace: AWS/Lambda
            MetricName: Errors
            Dimensions:
                - Name: FunctionName
                  Value: !Ref ListLedgerFunction
            Statistic: Sum
            Period: 300
            EvaluationPeriods: 1
            DatapointsToAlarm: 1
            Threshold: 1
            ComparisonOperator: GreaterThanOrEqualToThreshold
            TreatMissingData: notBreaching
            AlarmActions:
                - !Ref OpsAlertsTopic
    ApproveAgreementFunctionErrorsAlarm:
        Type: AWS::CloudWatch::Alarm
        Properties:
            AlarmName: !Sub '${AWS::StackName}-ApproveAgreementFunction-Errors'
            AlarmDescription: ApproveAgreementFunction reported Lambda errors
            Namespace: AWS/Lambda
            MetricName: Errors
            Dimensions:
                - Name: FunctionName
                  Value: !Ref ApproveAgreementFunction
            Statistic: Sum
            Period: 300
            EvaluationPeriods: 1
            DatapointsToAlarm: 1
            Threshold: 1
            ComparisonOperator: GreaterThanOrEqualToThreshold
            TreatMissingData: notBreaching
            AlarmActions:
                - !Ref OpsAlertsTopic
    FundAgreementFunctionErrorsAlarm:
        Type: AWS::CloudWatch::Alarm
        Properties:
            AlarmName: !Sub '${AWS::StackName}-FundAgreementFunction-Errors'
            AlarmDescription: FundAgreementFunction reported Lambda errors
            Namespace: AWS/Lambda
            MetricName: Errors
            Dimensions:
                - Name: FunctionName
                  Value: !Ref FundAgreementFunction
            Statistic: Sum
            Period: 300
            EvaluationPeriods: 1
            DatapointsToAlarm: 1
            Threshold: 1
            ComparisonOperator: GreaterThanOrEqualToThreshold
            TreatMissingData: notBreaching
            AlarmActions:
                - !Ref OpsAlertsTopic
    SettleAgreementFunctionErrorsAlarm:
        Type: AWS::CloudWatch::Alarm
        Properties:
            AlarmName: !Sub '${AWS::StackName}-SettleAgreementFunction-Errors'
            AlarmDescription: SettleAgreementFunction reported Lambda errors
            Namespace: AWS/Lambda
            MetricName: Errors
            Dimensions:
                - Name: FunctionName
                  Value: !Ref SettleAgreementFunction
            Statistic: Sum
            Period: 300
            EvaluationPeriods: 1
            DatapointsToAlarm: 1
            Threshold: 1
            ComparisonOperator: GreaterThanOrEqualToThreshold
            TreatMissingData: notBreaching
            AlarmActions:
                - !Ref OpsAlertsTopic
    SettlementProcessorFunctionErrorsAlarm:
        Type: AWS::CloudWatch::Alarm
        Properties:
            AlarmName: !Sub '${AWS::StackName}-SettlementProcessorFunction-Errors'
            AlarmDescription: SettlementProcessorFunction reported Lambda errors
            Namespace: AWS/Lambda
            MetricName: Errors
            Dimensions:
                - Name: FunctionName
                  Value: !Ref SettlementProcessorFunction
            Statistic: Sum
            Period: 300
            EvaluationPeriods: 1
            DatapointsToAlarm: 1
            Threshold: 1
            ComparisonOperator: GreaterThanOrEqualToThreshold
            TreatMissingData: notBreaching
            AlarmActions:
                - !Ref OpsAlertsTopic
    OutboxDispatcherFunctionErrorsAlarm:
        Type: AWS::CloudWatch::Alarm
        Properties:
            AlarmName: !Sub '${AWS::StackName}-OutboxDispatcherFunction-Errors'
            AlarmDescription: OutboxDispatcherFunction reported Lambda errors
            Namespace: AWS/Lambda
            MetricName: Errors
            Dimensions:
                - Name: FunctionName
                  Value: !Ref OutboxDispatcherFunction
            Statistic: Sum
            Period: 300
            EvaluationPeriods: 1
            DatapointsToAlarm: 1
            Threshold: 1
            ComparisonOperator: GreaterThanOrEqualToThreshold
            TreatMissingData: notBreaching
            AlarmActions:
                - !Ref OpsAlertsTopic

Outputs:
    PaymentsHttpApiUrl:
        Description: 'Base URL for the payments HTTP API'
        Value: !Sub 'https://${PaymentsHttpApi}.execute-api.${AWS::Region}.${AWS::URLSuffix}/Prod'
    CreateAgreementApi:
        Description: 'API Gateway endpoint URL for Prod stage for Create Agreement function'
        Value: !Sub 'https://${PaymentsHttpApi}.execute-api.${AWS::Region}.${AWS::URLSuffix}/Prod/agreements'
    CreateAgreementFunction:
        Description: 'Create Agreement Lambda Function ARN'
        Value: !GetAtt CreateAgreementFunction.Arn
    CreateAgreementFunctionIamRole:
        Description: 'Implicit IAM Role created for Create Agreement function'
        Value: !GetAtt CreateAgreementFunctionRole.Arn
    DebugEventsApi:
        Description: 'API Gateway endpoint URL for Prod stage for Debug Events function'
